name: Kesaseteli-shared Lint, Unit and Component tests

on:
  pull_request:
    paths:
      - ".github/workflows/ks-shared-frontend-tests.yml"
      - "frontend/kesaseteli/shared/**"
      - "frontend/shared/**"
      - "frontend/jest.config.js"
      - "frontend/tsconfig.json"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  common:
    uses: City-of-Helsinki/.github/.github/workflows/ci-node.yml@main
    secrets: inherit
    with:
      node-version: 22.x
      working-directory: ./frontend
      app-directory: ./frontend/kesaseteli/shared
      skip-build: true
