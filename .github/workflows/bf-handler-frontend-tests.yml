name: (BF-Handler) Lint, Unit and Component tests

on:
  pull_request:
    paths:
      - ".github/workflows/bf-handler-frontend-tests.yml"
      - "frontend/benefit/handler/**"
      - "frontend/benefit/shared/**"
      - "frontend/shared/**"
      - "frontend/jest.config.js"
      - "frontend/tsconfig.json"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  common:
    uses: City-of-Helsinki/.github/.github/workflows/ci-pnpm-node.yml@main
    secrets: inherit
    with:
      node-version: 24.x
      working-directory: ./frontend
      app-directory: ./frontend/benefit/handler
      extra-commands: echo 'NEXTJS_DISABLE_SENTRY=true' >> benefit/handler/.env
