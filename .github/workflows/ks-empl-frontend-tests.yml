name: (KS Employer) Frontend Lint, Unit and Component tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/ks-empl-frontend-tests.yml"
      - "frontend/kesaseteli/employer/**"
      - "frontend/kesaseteli/shared/**"
      - "frontend/shared/**"
      - "frontend/jest.config.js"
      - "frontend/tsconfig.json"
      - "frontend/next.config.js"
  workflow_dispatch:

jobs:
  common:
    uses: City-of-Helsinki/.github/.github/workflows/ci-pnpm-node.yml@main
    secrets: inherit
    with:
      node-version: 24.x
      working-directory: ./frontend
      app-directory: ./frontend/kesaseteli/employer
      extra-commands: echo 'NEXTJS_DISABLE_SENTRY=true' >> kesaseteli/employer/.env
