name: (KS) Backend CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/ks-backend-ci.yml'
      - '.pre-commit-config.yaml'
      - 'backend/kesaseteli/**'
      - 'backend/shared/**'
  workflow_dispatch:

jobs:
  common:
    uses: City-of-Helsinki/.github/.github/workflows/ci-django-api.yml@ci-django-api_working-directory
    secrets: inherit
    with:
      python-version: 3.12
      postgres-major-version: 17
      working-directory: ./backend/kesaseteli
      extra-commands: |
        echo 'DEBUG=1' >> .env
        echo 'OIDC_OP_BASE_URL=https://tunnistus.test.hel.ninja/auth/realms/helsinki-tunnistus/protocol/openid-connect' >> .env

        sudo apt-get install xmlsec1 libsasl2-dev libssl-dev