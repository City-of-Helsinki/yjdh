name: (BF-Applicant) Lint, Unit and Component tests

on:
  pull_request:
    paths:
      - ".github/workflows/bf-applicant-frontend-tests.yml"
      - "frontend/benefit/applicant/**"
      - "frontend/benefit/shared/**"
      - "frontend/shared/**"
      - "frontend/jest.config.js"
      - "frontend/tsconfig.json"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  common:
    uses: City-of-Helsinki/.github/.github/workflows/ci-node.yml@main
    secrets: inherit
    with:
      node-version: 22.x
      working-directory: ./frontend/benefit/applicant
      extra-commands: echo 'NEXTJS_DISABLE_SENTRY=true' >> .env
