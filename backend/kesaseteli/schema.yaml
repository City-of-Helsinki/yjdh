openapi: 3.1.0
info:
  title: Kesäseteli API
  version: 0.0.1
  description: REST API for Kesäseteli application management
paths:
  /excel-download/confirmed-youth-applications/:
    get:
      operationId: confirmed_youth_applications_list
      description: Download all active confirmed youth summer voucher applications
        as Excel. Requires an authenticated handler session (ADFS). Unauthenticated
        browser requests are redirected to login.
      tags:
      - excel-download
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
                    schema:
                      type: string
                      format: binary
          description: Excel spreadsheet download.
        '401':
          description: Authentication required.
        '403':
          description: Handler permission required.
      summary: confirmed youth applications list
  /excel-download/employer-applications/{export_kind}/{columns}/:
    get:
      operationId: employer_applications_retrieve
      description: Download employer summer voucher applications as Excel. Requires
        an authenticated handler session (ADFS). Unauthenticated browser requests
        are redirected to login.
      parameters:
      - in: path
        name: columns
        schema:
          type: string
          enum:
          - reporting
          - talpa
        description: 'Column layout for the spreadsheet. Supported values: reporting,
          talpa.'
        required: true
      - in: path
        name: export_kind
        schema:
          type: string
          enum:
          - annual
          - annual-previous
          - unhandled
        description: 'Export set: unhandled (mark submitted as exported), annual (current
          year), or annual-previous (previous calendar year).'
        required: true
      tags:
      - excel-download
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
                  schema:
                    type: string
                    format: binary
          description: Excel spreadsheet download.
        '302':
          description: 'Redirect to the Excel landing page (/excel-download/) with
            an error query parameter when export parameters are invalid or there is
            nothing to export. Query parameter: ``error``. Supported values: no_unhandled,
            no_applications, invalid_export_kind, invalid_columns.'
        '401':
          description: Authentication required.
        '403':
          description: Handler permission required.
      summary: employer applications retrieve
  /v1/company/:
    get:
      operationId: retrieve
      description: Return the company profile for the authenticated user.
      tags:
      - company
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
      summary: retrieve
  /v1/employerapplications/:
    get:
      operationId: list
      parameters:
      - in: query
        name: company__business_id
        schema:
          type: string
      - in: query
        name: company__business_id__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: company_id
        schema:
          type: string
          format: uuid
      - in: query
        name: company_id__in
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: created_at__date
        schema:
          type: string
          format: date
      - in: query
        name: created_at__date__gt
        schema:
          type: string
          format: date
      - in: query
        name: created_at__date__gte
        schema:
          type: string
          format: date
      - in: query
        name: created_at__date__lt
        schema:
          type: string
          format: date
      - in: query
        name: created_at__date__lte
        schema:
          type: string
          format: date
      - in: query
        name: created_at__gt
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at__gte
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at__lt
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at__lte
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at__year
        schema:
          type: number
      - in: query
        name: created_at__year__gt
        schema:
          type: number
      - in: query
        name: created_at__year__gte
        schema:
          type: number
      - in: query
        name: created_at__year__lt
        schema:
          type: number
      - in: query
        name: created_at__year__lte
        schema:
          type: number
      - in: query
        name: created_at_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at_before
        schema:
          type: string
          format: date-time
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: modified_at__date
        schema:
          type: string
          format: date
      - in: query
        name: modified_at__date__gt
        schema:
          type: string
          format: date
      - in: query
        name: modified_at__date__gte
        schema:
          type: string
          format: date
      - in: query
        name: modified_at__date__lt
        schema:
          type: string
          format: date
      - in: query
        name: modified_at__date__lte
        schema:
          type: string
          format: date
      - in: query
        name: modified_at__gt
        schema:
          type: string
          format: date-time
      - in: query
        name: modified_at__gte
        schema:
          type: string
          format: date-time
      - in: query
        name: modified_at__lt
        schema:
          type: string
          format: date-time
      - in: query
        name: modified_at__lte
        schema:
          type: string
          format: date-time
      - in: query
        name: modified_at__year
        schema:
          type: number
      - in: query
        name: modified_at__year__gt
        schema:
          type: number
      - in: query
        name: modified_at__year__gte
        schema:
          type: number
      - in: query
        name: modified_at__year__lt
        schema:
          type: number
      - in: query
        name: modified_at__year__lte
        schema:
          type: number
      - in: query
        name: modified_at_after
        schema:
          type: string
          format: date-time
      - in: query
        name: modified_at_before
        schema:
          type: string
          format: date-time
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: only_mine
        schema:
          type: boolean
      - in: query
        name: ordering
        schema:
          type: array
          items:
            type: string
            enum:
            - -company__business_id
            - -company__name
            - -company_id
            - -created_at
            - -id
            - -modified_at
            - -status
            - -user__first_name
            - -user__last_name
            - -user_id
            - company__business_id
            - company__name
            - company_id
            - created_at
            - id
            - modified_at
            - status
            - user__first_name
            - user__last_name
            - user_id
        description: |-
          Järjestys

          * `company__business_id` - Company  business id
          * `-company__business_id` - Company  business id (descending)
          * `company__name` - Company  name
          * `-company__name` - Company  name (descending)
          * `company_id` - Company id
          * `-company_id` - Company id (descending)
          * `created_at` - Created at
          * `-created_at` - Created at (descending)
          * `id` - Id
          * `-id` - Id (descending)
          * `modified_at` - Modified at
          * `-modified_at` - Modified at (descending)
          * `status` - Status
          * `-status` - Status (descending)
          * `user__first_name` - User  first name
          * `-user__first_name` - User  first name (descending)
          * `user__last_name` - User  last name
          * `-user__last_name` - User  last name (descending)
          * `user_id` - User id
          * `-user_id` - User id (descending)
        explode: false
        style: form
      - in: query
        name: status
        schema:
          type: array
          items:
            type: string
            enum:
            - accepted
            - additional_information_provided
            - additional_information_requested
            - deleted_by_customer
            - draft
            - rejected
            - submitted
        description: |-
          * `draft` - Draft
          * `submitted` - Submitted
          * `additional_information_requested` - Additional information requested
          * `additional_information_provided` - Additional information provided
          * `accepted` - Accepted
          * `rejected` - Rejected
          * `deleted_by_customer` - Deleted by customer
        explode: true
        style: form
      - in: query
        name: status__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: user_id
        schema:
          type: integer
      - in: query
        name: user_id__in
        schema:
          type: array
          items:
            type: integer
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      tags:
      - employerapplications
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmployerApplicationList'
          description: ''
      summary: list
    post:
      operationId: create
      description: Allow only 1 (DRAFT) application per user & company.
      tags:
      - employerapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerApplication'
          description: ''
      summary: create
  /v1/employerapplications/{id}/:
    get:
      operationId: retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer application.
        required: true
      tags:
      - employerapplications
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerApplication'
          description: ''
      summary: retrieve
    put:
      operationId: update
      description: Allow to update only DRAFT status applications.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer application.
        required: true
      tags:
      - employerapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployerApplication'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerApplication'
          description: ''
      summary: update
    patch:
      operationId: partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer application.
        required: true
      tags:
      - employerapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployerApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployerApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployerApplication'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerApplication'
          description: ''
      summary: partial update
    delete:
      operationId: destroy
      description: Allow to delete only DRAFT status applications.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer application.
        required: true
      tags:
      - employerapplications
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
      summary: destroy
  /v1/employersummervouchers/{id}/attachments/:
    post:
      operationId: attachments_create
      description: Upload a single file as attachment.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer summer voucher.
        required: true
      tags:
      - employersummervouchers
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployerSummerVoucherAttachmentUploadInput'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
        '400':
          description: Invalid input
        '403':
          description: Forbidden
        '404':
          description: Voucher not found
      summary: attachments create
  /v1/employersummervouchers/{id}/attachments/{attachment_pk}/:
    get:
      operationId: attachments_retrieve
      description: Download or delete a single attachment identified by its UUID.
      parameters:
      - in: path
        name: attachment_pk
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this attachment.
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer summer voucher.
        required: true
      tags:
      - employersummervouchers
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '204':
          description: Attachment deleted
        '404':
          description: File not found
      summary: attachments retrieve
    delete:
      operationId: attachments_destroy
      description: Download or delete a single attachment identified by its UUID.
      parameters:
      - in: path
        name: attachment_pk
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this attachment.
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this employer summer voucher.
        required: true
      tags:
      - employersummervouchers
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '204':
          description: Attachment deleted
        '404':
          description: File not found
      summary: attachments destroy
  /v1/schools/:
    get:
      operationId: list_2
      tags:
      - schools
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/School'
          description: ''
      summary: list
  /v1/summer_voucher_configuration/:
    get:
      operationId: list_3
      tags:
      - summer_voucher_configuration
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SummerVoucherConfiguration'
          description: ''
      summary: list
  /v1/target_groups/:
    get:
      operationId: list_4
      description: |-
        DEPRECATED: This view is preserved for backward compatibility but is no
        longer used by the frontend. New code should use SummerVoucherConfiguration
        instead.
      tags:
      - target_groups
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TargetGroup'
          description: ''
      summary: list
  /v1/youthapplications/:
    post:
      operationId: create_2
      description: Create a VTJ-backed youth application and notify the applicant.
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YouthApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/YouthApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/YouthApplication'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplicationOutput'
          description: ''
        '400':
          description: Validation rejected
        '500':
          description: Failed to send email
      summary: create
  /v1/youthapplications/{id}/:
    get:
      operationId: retrieve_3
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplication'
          description: ''
      summary: retrieve
  /v1/youthapplications/{id}/accept/:
    patch:
      operationId: accept_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Application accepted
        '400':
          description: Application was not accepted
      summary: accept partial update
  /v1/youthapplications/{id}/activate/:
    get:
      operationId: activate_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      security:
      - cookieAuth: []
      - {}
      responses:
        '302':
          description: Redirect to the relevant application status page
        '401':
          description: Unable to activate application
        '500':
          description: Failed to send email
      summary: activate retrieve
  /v1/youthapplications/{id}/additional_info/:
    post:
      operationId: additional_info_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YouthApplicationAdditionalInfo'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/YouthApplicationAdditionalInfo'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/YouthApplicationAdditionalInfo'
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplicationAdditionalInfo'
          description: ''
        '400':
          description: Invalid input or status
        '500':
          description: Failed to send email
      summary: additional info create
  /v1/youthapplications/{id}/process/:
    get:
      operationId: process_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      security:
      - cookieAuth: []
      - {}
      responses:
        '302':
          description: Redirect to handler processing page
      summary: process retrieve
  /v1/youthapplications/{id}/reject/:
    patch:
      operationId: reject_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedYouthApplicationHandling'
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Application rejected
        '400':
          description: Application was not rejected
      summary: reject partial update
  /v1/youthapplications/{id}/status/:
    get:
      operationId: status_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this youth application.
        required: true
      tags:
      - youthapplications
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplication'
          description: ''
      summary: status retrieve
  /v1/youthapplications/create-without-ssn/:
    post:
      operationId: create_without_ssn_create
      description: |-
        Create a YouthApplication without a social security number.

        NOTE:
            - Handles request.data conversion from QueryDict to dict to ensure
              JSONField (additional_info_user_reasons) values are handled correctly
              as lists, preventing "Invalid JSON" validation errors.
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NonVtjYouthApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NonVtjYouthApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NonVtjYouthApplication'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplicationOutput'
          description: ''
        '400':
          description: Validation rejected
        '500':
          description: Failed to send email
      summary: create without ssn create
  /v1/youthapplications/fetch_employee_data/:
    post:
      operationId: fetch_employee_data_create
      description: |-
        Fetch employee data to a particular EmployerSummerVoucher using the
        employee's name and their YouthSummerVoucher's
        summer_voucher_serial_number.
      tags:
      - youthapplications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YouthApplicationFetchEmployeeDataInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/YouthApplicationFetchEmployeeDataInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/YouthApplicationFetchEmployeeDataInput'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YouthApplicationFetchEmployeeDataOutput'
          description: ''
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Employee not found
      summary: fetch employee data create
components:
  schemas:
    ApplicationLanguageEnum:
      enum:
      - fi
      - sv
      - en
      type: string
      description: |-
        * `fi` - suomi
        * `sv` - svenska
